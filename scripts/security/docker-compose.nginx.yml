# Reverse-proxy staging for trustProxy / X-Forwarded-* tests.
# Panel must be running on host port 40120 (npm run dev in core).
services:
    nginx:
        image: nginx:1.27-alpine
        ports:
            - '40121:80'
        volumes:
            - ./nginx-staging.conf:/etc/nginx/conf.d/default.conf:ro
        extra_hosts:
            - 'host.docker.internal:host-gateway'
